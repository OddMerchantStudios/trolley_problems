<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absurd Trolley Problems — Analysis</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f7;
  --sidebar-bg: #ffffff;
  --card-bg: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --human: #64748b;
  --claude: #c96442;
  --gpt: #10a37f;
  --gemini: #4285f4;
  --pull-bg: #dcfce7;
  --pull-text: #166534;
  --nopull-bg: #fee2e2;
  --nopull-text: #991b1b;
  --split-bg: #f3e8ff;
  --split-text: #6b21a8;
  --other-bg: #f1f5f9;
  --other-text: #475569;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── Sidebar ─── */
aside {
  width: 280px;
  min-width: 280px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.sidebar-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.3;
}

.sidebar-header p {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

nav::-webkit-scrollbar { width: 4px; }
nav::-webkit-scrollbar-track { background: transparent; }
nav::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  border-left: 3px solid transparent;
  font-size: 14px;
}

.nav-item:hover { background: #f9fafb; }

.nav-item.active {
  background: #f3f4f6;
  border-left-color: var(--text);
  font-weight: 600;
}

.nav-num {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  min-width: 22px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.nav-title {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-dots {
  display: flex;
  gap: 3px;
  margin-left: auto;
  flex-shrink: 0;
}

.nav-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.nav-dot.pull { background: #22c55e; }
.nav-dot.nopull { background: #ef4444; }
.nav-dot.split { background: #a855f7; }
.nav-dot.other { background: #94a3b8; }

/* ─── Main ─── */
main {
  flex: 1;
  overflow-y: auto;
  padding: 48px 56px 80px;
}

main::-webkit-scrollbar { width: 6px; }
main::-webkit-scrollbar-track { background: transparent; }
main::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

.problem-header {
  margin-bottom: 36px;
}

.problem-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.problem-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}

.problem-prompt {
  font-size: 16px;
  line-height: 1.65;
  color: #374151;
  max-width: 640px;
}

/* ─── Track Visualization ─── */
.track-container {
  margin: 32px 0 40px;
  max-width: 700px;
}

.track-svg {
  width: 100%;
  max-width: 700px;
  height: auto;
}

.track-line { stroke: #d1d5db; stroke-width: 4; stroke-linecap: round; fill: none; }
.track-line-main { stroke: #9ca3af; stroke-width: 5; }
.track-emoji { font-size: 26px; }
.track-label { font-size: 12px; fill: #6b7280; }
.track-tag { font-size: 10px; fill: #9ca3af; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

@keyframes trolleyRock {
  0%, 100% { transform: translateY(0) rotate(-1deg); }
  50% { transform: translateY(-2px) rotate(1deg); }
}

.trolley-emoji {
  font-size: 30px;
  animation: trolleyRock 1.2s ease-in-out infinite;
  transform-origin: center;
}

/* ─── Consensus Banner ─── */
.consensus {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: #f9fafb;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 32px;
}

.consensus-label { font-weight: 600; }

.consensus .answer-badge {
  font-size: 12px;
  padding: 3px 10px;
}

/* ─── Response Cards ─── */
.responses-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  max-width: 800px;
}

.response-card {
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 16px 20px;
  text-align: center;
  cursor: default;
  transition: box-shadow 0.2s, transform 0.2s;
}

.response-card:hover {
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}

.card-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-size: 20px;
  font-weight: 700;
  color: white;
}

.card-icon.human { background: var(--human); }
.card-icon.claude,
.card-icon.gpt,
.card-icon.gemini {
  background: #ffffff;
  border: 1.5px solid var(--border);
}

.card-icon svg { width: 22px; height: 22px; }
.card-icon img { width: 28px; height: 28px; object-fit: contain; border-radius: 0; }

.card-name {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

.answer-badge {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  line-height: 1.3;
}

.answer-badge.pull { background: var(--pull-bg); color: var(--pull-text); }
.answer-badge.nopull { background: var(--nopull-bg); color: var(--nopull-text); }
.answer-badge.split { background: var(--split-bg); color: var(--split-text); }
.answer-badge.other { background: var(--other-bg); color: var(--other-text); }

.hover-hint {
  font-size: 10px;
  color: #c0c4cc;
  margin-top: 10px;
  transition: opacity 0.2s;
}

.response-card:hover .hover-hint { opacity: 0; }

/* ─── Thought Bubble ─── */
.thought-bubble {
  position: absolute;
  bottom: calc(100% + 22px);
  left: 50%;
  transform: translateX(-50%) translateY(6px) scale(0.97);
  background: #ffffff;
  border-radius: 16px;
  padding: 18px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.13), 0 1px 3px rgba(0,0,0,0.06);
  opacity: 0;
  pointer-events: none;
  transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 320px;
  text-align: left;
  z-index: 100;
  line-height: 1.55;
  font-size: 13px;
  color: #374151;
}

.thought-bubble::before {
  content: '';
  position: absolute;
  bottom: -11px;
  left: 50%;
  transform: translateX(-50%);
  width: 14px;
  height: 14px;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 3px 8px rgba(0,0,0,0.07);
}

.thought-bubble::after {
  content: '';
  position: absolute;
  bottom: -20px;
  left: 50%;
  transform: translateX(-2px);
  width: 9px;
  height: 9px;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.response-card:hover .thought-bubble {
  opacity: 1;
  transform: translateX(-50%) translateY(0) scale(1);
  pointer-events: auto;
}

.bubble-reasoning { color: #374151; }

.bubble-notes {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid #f0f0f0;
}

.bubble-notes-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--claude);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.bubble-notes-text {
  font-size: 13px;
  color: #92400e;
  font-style: italic;
}

/* Adjust bubble position for edge cards */
.response-card:first-child .thought-bubble {
  left: 0;
  transform: translateX(0) translateY(6px) scale(0.97);
}
.response-card:first-child:hover .thought-bubble {
  transform: translateX(0) translateY(0) scale(1);
}
.response-card:first-child .thought-bubble::before {
  left: 30px;
}
.response-card:first-child .thought-bubble::after {
  left: 30px;
}

.response-card:last-child .thought-bubble {
  left: auto;
  right: 0;
  transform: translateX(0) translateY(6px) scale(0.97);
}
.response-card:last-child:hover .thought-bubble {
  transform: translateX(0) translateY(0) scale(1);
}
.response-card:last-child .thought-bubble::before {
  left: auto;
  right: 25px;
}
.response-card:last-child .thought-bubble::after {
  left: auto;
  right: 28px;
}

/* Match indicator */
.match-indicator {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 12px;
  opacity: 0.6;
}

/* ─── Responsive ─── */
@media (max-width: 1100px) {
  .responses-grid { grid-template-columns: repeat(2, 1fr); }
  .thought-bubble { width: 280px; }
  .response-card:first-child .thought-bubble,
  .response-card:last-child .thought-bubble,
  .response-card .thought-bubble {
    left: 50%;
    right: auto;
    transform: translateX(-50%) translateY(6px) scale(0.97);
  }
  .response-card:first-child:hover .thought-bubble,
  .response-card:last-child:hover .thought-bubble,
  .response-card:hover .thought-bubble {
    transform: translateX(-50%) translateY(0) scale(1);
  }
  .response-card .thought-bubble::before,
  .response-card .thought-bubble::after {
    left: 50%;
    right: auto;
  }
}

@media (max-width: 768px) {
  aside { width: 220px; min-width: 220px; }
  main { padding: 32px 28px 60px; }
  .problem-title { font-size: 22px; }
  .responses-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

// ─── State ───
let currentIndex = 0;

// ─── Helpers ───
function answerClass(answer) {
  const a = answer.toLowerCase();
  if (a.includes('pull')) return 'pull';
  if (a.includes('nothing')) return 'nopull';
  if (a.includes('split')) return 'split';
  return 'other';
}

function answersMatch(a, b) {
  return answerClass(a) === answerClass(b);
}

// ─── Render Nav ───
function renderNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = DATA.map((p, i) => {
    const dots = [
      answerClass(p.humanConsensus),
      answerClass(p.claude.answer),
      answerClass(p.gpt.answer),
      answerClass(p.gemini.answer)
    ];
    return `
    <div class="nav-item${i === currentIndex ? ' active' : ''}" data-index="${i}">
      <span class="nav-num">${p.level}</span>
      <span class="nav-title">${p.title}</span>
      <span class="nav-dots">
        ${dots.map(d => `<span class="nav-dot ${d}"></span>`).join('')}
      </span>
    </div>`;
  }).join('');

  nav.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      currentIndex = parseInt(item.dataset.index);
      renderNav();
      renderMain();
      window.location.hash = `#${currentIndex + 1}`;
    });
  });
}

// ─── Render Track SVG ───
function renderTrackSVG(tracks) {
  const pullEmoji = tracks.pull.emoji;
  const pullLabel = tracks.pull.label;
  const noPullEmoji = tracks.noPull.emoji;
  const noPullLabel = tracks.noPull.label;

  return `
    <svg class="track-svg" viewBox="0 0 720 240" xmlns="http://www.w3.org/2000/svg">
      <!-- Main track to fork -->
      <line x1="85" y1="120" x2="210" y2="120" class="track-line track-line-main" />

      <!-- Top track (pull lever / diverted) -->
      <path d="M 210 120 C 240 120, 260 62, 300 62" class="track-line" stroke-dasharray="8 5" />
      <line x1="300" y1="62" x2="680" y2="62" class="track-line" stroke-dasharray="8 5" />

      <!-- Bottom track (don't pull / straight) -->
      <path d="M 210 120 C 240 120, 260 178, 300 178" class="track-line track-line-main" />
      <line x1="300" y1="178" x2="680" y2="178" class="track-line track-line-main" />

      <!-- Direction arrow on bottom track -->
      <polygon points="270,178 258,171 258,185" fill="#9ca3af" opacity="0.7" />

      <!-- Lever -->
      <circle cx="215" cy="142" r="5" fill="#6b7280" />
      <line x1="215" y1="142" x2="206" y2="119" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" />

      <!-- Trolley -->
      <g class="trolley-emoji">
        <text x="36" y="132" font-size="32" text-anchor="middle">\u{1F68B}</text>
      </g>

      <!-- Top track items -->
      <text x="490" y="54" class="track-emoji" text-anchor="middle">${pullEmoji}</text>
      <text x="490" y="80" class="track-label" text-anchor="middle">${pullLabel}</text>

      <!-- Bottom track items -->
      <text x="490" y="170" class="track-emoji" text-anchor="middle">${noPullEmoji}</text>
      <text x="490" y="196" class="track-label" text-anchor="middle">${noPullLabel}</text>

      <!-- Track labels -->
      <text x="680" y="54" class="track-tag" text-anchor="end" fill="#9ca3af">\u21AA PULL</text>
      <text x="680" y="200" class="track-tag" text-anchor="end" fill="#6b7280">\u2192 DEFAULT</text>
    </svg>
  `;
}

// ─── Icons ───
const ICONS = {
  human: `<svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="7" r="4"/><path d="M12 13c-4.42 0-8 1.79-8 4v2h16v-2c0-2.21-3.58-4-8-4z"/></svg>`,
  claude: `<img src="assets/claude-logo.png" alt="Claude">`,
  gpt: `<img src="assets/ChatGPT_logo.png" alt="GPT">`,
  gemini: `<img src="assets/Google-gemini-icon.png" alt="Gemini">`
};

// ─── Render Main ───
function renderMain() {
  const p = DATA[currentIndex];
  const main = document.getElementById('main');

  const cards = [
    { key: 'human', name: 'Human', icon: 'human', color: 'human', answer: p.humanConsensus, reasoning: 'Majority consensus from neil.fun players', notes: '' },
    { key: 'claude', name: 'Claude', icon: 'claude', color: 'claude', answer: p.claude.answer, reasoning: p.claude.reasoning, notes: p.claude.notes },
    { key: 'gpt', name: 'GPT', icon: 'gpt', color: 'gpt', answer: p.gpt.answer, reasoning: p.gpt.reasoning, notes: p.gpt.notes },
    { key: 'gemini', name: 'Gemini', icon: 'gemini', color: 'gemini', answer: p.gemini.answer, reasoning: p.gemini.reasoning, notes: p.gemini.notes }
  ];

  main.innerHTML = `
    <div class="problem-header">
      <div class="problem-num">Problem ${p.level} of ${DATA.length}</div>
      <div class="problem-title">${p.title}</div>
      <div class="problem-prompt">${p.prompt}</div>
    </div>

    <div class="track-container">
      ${renderTrackSVG(p.tracks)}
    </div>

    <div class="responses-grid">
      ${cards.map(c => {
        const cls = answerClass(c.answer);
        const matchesHuman = c.key !== 'human' && answersMatch(c.answer, p.humanConsensus);
        const matchIcon = c.key === 'human' ? '' :
          (matchesHuman ? '<span class="match-indicator" title="Matches human consensus">\u2713</span>' : '<span class="match-indicator" title="Differs from human consensus">\u2717</span>');

        return `
          <div class="response-card">
            ${matchIcon}
            <div class="card-icon ${c.color}">${ICONS[c.icon]}</div>
            <div class="card-name">${c.name}</div>
            <span class="answer-badge ${cls}">${c.answer}</span>
            <div class="hover-hint">hover for reasoning</div>
            <div class="thought-bubble">
              <div class="bubble-reasoning">${c.reasoning}</div>
              ${c.notes ? `
                <div class="bubble-notes">
                  <div class="bubble-notes-label">Author's notes</div>
                  <div class="bubble-notes-text">${c.notes}</div>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  main.scrollTop = 0;
}

// ─── Keyboard Nav ───
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    if (currentIndex < DATA.length - 1) {
      currentIndex++;
      renderNav();
      renderMain();
      window.location.hash = `#${currentIndex + 1}`;
      document.querySelector('.nav-item.active')?.scrollIntoView({ block: 'nearest' });
    }
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentIndex > 0) {
      currentIndex--;
      renderNav();
      renderMain();
      window.location.hash = `#${currentIndex + 1}`;
      document.querySelector('.nav-item.active')?.scrollIntoView({ block: 'nearest' });
    }
  }
});

// ─── Hash routing ───
function loadFromHash() {
  const hash = window.location.hash.replace('#', '');
  const idx = parseInt(hash) - 1;
  if (!isNaN(idx) && idx >= 0 && idx < DATA.length) {
    currentIndex = idx;
  }
}

// ─── Init ───
loadFromHash();
renderNav();
renderMain();

window.addEventListener('hashchange', () => {
  loadFromHash();
  renderNav();
  renderMain();
});
</script>
